{{- if and .Values.minio.enabled .Values.minio.defaultBucket }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vexa.componentName" (list . "minio-bucket") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "0"
spec:
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio-bucket
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: "{{ regexReplaceAll "/minio:.*" .Values.minio.image "/mc:latest" }}"
          command:
            - /bin/sh
            - -c
            - |
              mc alias set myminio http://{{ include "vexa.componentName" (list . "minio") }}:{{ .Values.minio.service.apiPort }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" && \
              mc mb --ignore-existing myminio/{{ .Values.minio.defaultBucket }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.minioSecretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.minioSecretName" . }}
                  key: MINIO_ROOT_PASSWORD
  backoffLimit: 3
{{- end }}
