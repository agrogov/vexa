{{- if .Values.decisionListener.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vexa.componentName" (list . "decision-listener") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  type: {{ .Values.decisionListener.service.type }}
  ports:
    - name: http
      port: {{ .Values.decisionListener.service.port }}
      targetPort: http
  selector:
    {{- include "vexa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: decision-listener
{{- end }}
